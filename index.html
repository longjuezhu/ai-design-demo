<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 辅助 UI/UX 原型演示</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      color: #1f2937;
    }

    .page {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      background: #ffffff;
      padding: 20px 16px;
      box-sizing: border-box;
    }

    .header {
      margin-bottom: 20px;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2563eb;
      font-size: 12px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      line-height: 1.4;
      margin: 0 0 8px;
    }

    .desc {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .search {
      height: 44px;
      background: #f3f4f6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: #9ca3af;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .ai-card {
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
      margin-bottom: 16px;
      border: 1px solid #e5edff;
    }

    .ai-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .ai-text {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
    }

    .chips {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
    }

    .chip {
      flex-shrink: 0;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 13px;
      color: #4b5563;
    }

    .chip.active {
      background: #111827;
      color: #ffffff;
    }

    .product-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      margin-bottom: 12px;
      background: #ffffff;
    }

    .product-img {
      width: 92px;
      height: 92px;
      border-radius: 12px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .product-info {
      flex: 1;
    }

    .product-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .reason {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .price {
      color: #ef4444;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .button {
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: #111827;
      color: white;
      font-size: 12px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 20px 0 12px;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="header">
      <span class="tag">AI Assisted Design</span>
      <h1>AI 商品推荐页原型</h1>
      <p class="desc">
        这是一个使用 AI 辅助完成的 UI/UX 原型练习，模拟电商场景中如何通过推荐理由帮助用户降低决策成本。
      </p>
    </section>

    <div class="search">搜索你感兴趣的商品</div>

    <section class="ai-card">
      <div class="ai-title">AI 为你推荐</div>
      <div class="ai-text">
        根据你的浏览偏好，系统优先推荐高评价、价格适中，并且适合日常通勤场景的商品。
      </div>
    </section>

    <div class="chips">
      <div class="chip active">综合推荐</div>
      <div class="chip">高性价比</div>
      <div class="chip">通勤适合</div>
      <div class="chip">近期热门</div>
    </div>

    <div class="section-title">推荐商品</div>

    <section class="product-card">
      <div class="product-img"></div>
      <div class="product-info">
        <div class="product-title">轻量通勤双肩包</div>
        <div class="reason">推荐理由：容量适中，适合上课、实习和短途出行。</div>
        <div class="price">¥199</div>
        <div class="button">查看详情</div>
      </div>
    </section>

    <section class="product-card">
      <div class="product-img"></div>
      <div class="product-info">
        <div class="product-title">百搭基础款外套</div>
        <div class="reason">推荐理由：风格简洁，适合多场景穿搭，近期好评较高。</div>
        <div class="price">¥269</div>
        <div class="button">查看详情</div>
      </div>
    </section>
  </main>
</body>
</html>
